name: Deploy Release Artifacts

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cd
  cancel-in-progress: false

jobs:
  attach-artifacts:
    name: Zip and attach wrappers
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve latest release tag
        id: rel
        run: |
          # On manual dispatch a release may not exist yet — exit cleanly
          # instead of failing the run.
          if ! TAG="$(gh release view --json tagName --jq .tagName 2>/dev/null)"; then
            echo "no release found — nothing to attach artifacts to" >&2
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wrappers
        if: ${{ steps.rel.outputs.tag != '' }}
        run: ./build-wrappers.sh

      - name: Zip wrappers
        if: ${{ steps.rel.outputs.tag != '' }}
        run: |
          mkdir -p dist
          count=0
          for name in "Convert PDF to JPG.workflow" "Convert PDF to PNG.workflow" \
                      "Convert PDF to JPG.shortcut" "Convert PDF to PNG.shortcut"; do
            if [ ! -e "$name" ]; then
              echo "skipping missing wrapper: $name"
              continue
            fi
            ditto -c -k --sequesterRsrc --keepParent "$name" "dist/${name// /-}.zip"
            count=$((count + 1))
          done
          if [ "$count" -eq 0 ]; then
            echo "error: no wrappers found to attach" >&2
            exit 1
          fi
          ls -l dist

      - name: Attach to release
        if: ${{ steps.rel.outputs.tag != '' }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
