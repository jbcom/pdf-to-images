name: Feature request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the tool doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: markdown
    attributes:
      value: >
        Note: pdf-to-images has a zero-runtime-dependency rule. Proposals that
        would require Homebrew or a third-party package are unlikely to be
        accepted — see CONTRIBUTING.md.
